services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student
      POSTGRES_DB: student_course
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d student_course"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot migration runner: applies migrations then exits.
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://student:student@postgres:5432/student_course?sslmode=disable",
        "up",
      ]

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://student:student@postgres:5432/student_course?sslmode=disable
      HTTP_PORT: "8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"

volumes:
  pgdata:
